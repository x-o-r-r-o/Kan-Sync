name: Attest release assets

# Publishes GitHub artifact attestations (build provenance) for release
# assets so Obsidian's community review and users can verify main.js /
# styles.css / manifest.json were published from this repository.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to attest (e.g. 0.5.1)
        required: true

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        run: echo "tag=${{ github.event.release.tag_name || inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Download published release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern main.js \
            --pattern manifest.json \
            --pattern styles.css \
            --dir dist
          ls -la dist

      - name: Attest release assets
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            dist/main.js
            dist/manifest.json
            dist/styles.css
